services:
  - type: web
    name: todo-app
    env: python
    plan: starter
    disk:
      name: media-disk
      mountPath: /var/data
      sizeGB: 1
    buildCommand: "bash ./build.sh"
    startCommand: "cd todo_project && gunicorn todo_project.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: todo-postgres
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_MEDIA_ROOT
        value: "/var/data/media"
      - key: DJANGO_SERVE_MEDIA_FILES
        value: "True"

databases:
  - name: todo-postgres
    plan: free
